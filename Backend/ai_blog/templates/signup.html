{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IntelliBlogger</title>
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo.png' %}">
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
    <script type="text/JavaScript" src="{% static 'js/alert.js' %}"></script>
</head>

<body class="bg-gray-100 font-sans antialised">
    <!-- Navbar -->
    <nav class="bg-gray-600 p-4 text-white flex justify-between">
        <div>
            <a href="" class="text-3xl font-bold">IntelliBlogger</a>
        </div>
        <div>
            <a href="login"
                class="menu-item text-white hover:bg-green-600 hover:text-white hover:border hover:border-transparent hover:shadow-md mx-4 px-2 py-1 rounded login-link">Login</a>
        </div>
    </nav>

    <!-- Main content -->
    <div class="flex items-center justify-center h-screen">
        <div class="bg-white p-8 shadow-md rounded-lg max-w-md w-full">

            <!-- Login form -->
            <form class="space-y-4" action="" method="POST">
                {% csrf_token %}
                {% if error_message %}
                <div class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded relative" role="alert"
                    id="error-alert">
                    <span class="block sm:inline">{{ error_message }}</span>
                    <span class="absolute top-0 bottom-0 right-0 px-4 py-3" onclick="dismissAlert()">
                        <svg class="fill-current h-6 w-6 text-red-500 cursor-pointer" role="button"
                            xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20">
                            <title>Close</title>
                            <path
                                d="M14.348 14.849a1.2 1.2 0 0 1-1.697 0L10 11.819l-2.651 3.029a1.2 1.2 0 1 1-1.697-1.697l2.758-3.15-2.759-3.152a1.2 1.2 0 1 1 1.697-1.697L10 8.183l2.651-3.031a1.2 1.2 0 1 1 1.697 1.697l-2.758 3.152 2.758 3.15a1.2 1.2 0 0 1 0 1.698z" />
                        </svg>
                    </span>
                </div>
                {% endif %}
                <div class="text-center">
                    <h2 class="text-2xl font-semibold">Signup</h2>
                </div>
                <div>
                    <label for="username" class="block mb-1 font-medium">Username</label>
                    <input type="text" id="username" name="username" placeholder="Enter your username..."
                        class="w-full p-2 border rounded" style="color: black">
                </div>
                <div>
                    <label for="email" class="block mb-1 font-medium">Email</label>
                    <input type="email" id="email" name="email" placeholder="Enter your email..."
                        class="w-full p-2 border rounded" style="color: black">
                </div>
                <div>
                    <label for="password" class="block mb-1 font-medium">Password</label>
                    <input type="password" id="password" name="password" placeholder="Enter your password..."
                        class="w-full p-2 border rounded" style="color: black">
                </div>
                <div>
                    <label for="repeatPassword" class="block mb-1 font-medium">Repeat Password</label>
                    <input type="password" id="repeatPassword" name="repeatPassword"
                        placeholder="Repeat your password..." class="w-full p-2 border rounded" style="color: black">
                </div>
                <br>
                <button type="submit"
                    class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">Signup</button>
            </form>
            <div class="text-center mt-4">
                <p>Already have an account? <a href="login"
                        class="text-green-600 font-semibold hover:underline">Login</a></p>
            </div>
        </div>
    </div>
</body>

</html>
